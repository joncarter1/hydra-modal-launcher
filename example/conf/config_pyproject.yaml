defaults:
  - _self_
  - override hydra/launcher: modal

lr: 0.01
epochs: 10

hydra:
  launcher:
    app_name: hydra-modal-example-pyproject
    parallelism: 2
    image:
      # Explicit relative path. From the documented invocation (`uv run
      # example/my_app.py` from the repo root), a bare "pyproject.toml" would
      # match the launcher's own pyproject at CWD; this path disambiguates to
      # example/pyproject.toml.
      pip_pyproject: example/pyproject.toml
    function:
      cpu: 0.5
      memory: 1024
      timeout: 120
